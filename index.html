<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Customer Service</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-global: #f8fafc;
            --bg-container: #ffffff;
            --bg-chatbox: #fafafa;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --msg-user: #4f46e5;
            --msg-ai: #f1f5f9;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-global);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .chat-container {
            width: 100%;
            max-width: 440px;
            height: 680px;
            background: var(--bg-container);
            border-radius: 24px;
            box-shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.06), 0 1px 3px rgba(15, 23, 42, 0.02);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .chat-header {
            padding: 24px 28px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header .status-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
        }

        .chat-header h1 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: -0.01em;
        }

        .chat-header p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .chat-box {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            background-color: var(--bg-chatbox);
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        /* Modern Custom Scrollbar */
        .chat-box::-webkit-scrollbar {
            width: 5px;
        }
        .chat-box::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-box::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 99px;
        }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeInUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        .user-msg {
            background-color: var(--msg-user);
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .ai-msg {
            background-color: var(--msg-ai);
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 18px 24px 24px 24px;
            background: var(--bg-container);
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 1px solid var(--border-color);
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 20px;
            background-color: #f1f5f9;
            border: 1px solid transparent;
            border-radius: 16px;
            font-family: inherit;
            font-size: 14px;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s ease;
        }

        input[type="text"]::placeholder {
            color: var(--text-muted);
            opacity: 0.8;
        }

        input[type="text"]:focus {
            background-color: var(--bg-container);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.08);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transform: translateX(1px);
        }

        .loading {
            align-self: flex-start;
            display: none;
            padding: 12px 18px;
            background-color: var(--msg-ai);
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            animation: fadeIn 0.3s ease forwards;
        }

        .dot-flashing {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 14px;
        }

        .dot-flashing span {
            width: 6px;
            height: 6px;
            background-color: var(--text-muted);
            border-radius: 50%;
            display: inline-block;
            animation: dotFlashing 1.4s infinite linear;
            opacity: 0.4;
        }

        .dot-flashing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot-flashing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes dotFlashing {
            0%, 100% {
                transform: scale(1);
                opacity: 0.4;
            }
            50% {
                transform: scale(1.2);
                opacity: 1;
            }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="status-dot"></div>
        <div>
            <h1>CS Agent</h1>
            <p>Ready to help you instantly</p>
        </div>
    </div>
    
    <div class="chat-box" id="chat-box">
        <div class="message ai-msg" style="opacity: 1; transform: translateY(0);">Hello! How can I help you today?</div>
    </div>
    
    <div class="loading" id="loading-indicator">
        <div class="dot-flashing">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Type your question here..." onkeypress="handleEnter(event)">
        </div>
        <button onclick="sendMessage()">
            <svg viewBox="0 0 24 24">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");
        const loadingIndicator = document.getElementById("loading-indicator");
        const question = inputField.value.trim();

        if (question === "") return;

        // 1. Display user message on screen
        appendMessage(question, "user-msg");
        inputField.value = "";
        
        // Show loading animation below chat-box
        chatBox.appendChild(loadingIndicator);
        loadingIndicator.style.display = "block";
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // 2. Send question to FastAPI backend via POST request
            const response = await fetch("http://localhost:8000/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ question: question })
            });

            const data = await response.json();

            // Hide loading before displaying the answer
            loadingIndicator.style.display = "none";

            // 3. Display AI answer on screen
            if (data.status === "success") {
                appendMessage(data.answer, "ai-msg");
            } else {
                appendMessage("Error: " + data.answer, "ai-msg");
            }
        } catch (error) {
            loadingIndicator.style.display = "none";
            appendMessage("Failed to connect to the server. Please ensure FastAPI is running.", "ai-msg");
        }
    }

    function appendMessage(text, className) {
        const chatBox = document.getElementById("chat-box");
        const msgDiv = document.createElement("div");
        msgDiv.className = "message " + className;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to bottom
    }

    function handleEnter(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    }
</script>

</body>
</html>
